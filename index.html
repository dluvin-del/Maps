<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>American Irrigation – Dealer Network Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
html, body { margin:0; padding:0; height:100%; font-family:'Segoe UI',Arial,sans-serif; background:#0d1b2a; color:#e8eaf0; overflow:hidden; }
#header { background:linear-gradient(135deg,#0d2035 0%,#0d3d1e 100%); padding:8px 14px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; box-shadow:0 2px 10px rgba(0,0,0,.6); border-bottom:1px solid #1e4a2a; }
#logo-wrap img { height:42px; width:auto; display:block; }
#header-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; flex:1; min-width:0; }
.brand-toggles { display:flex; gap:5px; flex-wrap:wrap; }
.brand-check { display:flex; align-items:center; gap:5px; padding:5px 10px; border-radius:8px; border:1px solid #2a4a6a; cursor:pointer; font-size:.73rem; font-weight:700; transition:all .2s; user-select:none; white-space:nowrap; }
.brand-check input { display:none; }
.brand-check .dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.brand-check.valley { border-color:#2ea84f; } .brand-check.valley.on { background:rgba(46,168,79,.18); } .brand-check.valley .dot { background:#2ea84f; }
.brand-check.zimmatic { border-color:#e07b20; } .brand-check.zimmatic.on { background:rgba(224,123,32,.18); } .brand-check.zimmatic .dot { background:#e07b20; }
.brand-check.reinke { border-color:#a855f7; } .brand-check.reinke.on { background:rgba(168,85,247,.18); } .brand-check.reinke .dot { background:#a855f7; }
.brand-check:not(.on) { opacity:.5; }
.stats { display:flex; gap:5px; flex-wrap:wrap; }
.stat { border-radius:20px; padding:3px 9px; font-size:.69rem; white-space:nowrap; cursor:pointer; border:1px solid transparent; }
.stat.v { background:rgba(46,168,79,.12); color:#7adfa0; border-color:rgba(46,168,79,.3); }
.stat.z { background:rgba(224,123,32,.12); color:#f4a85a; border-color:rgba(224,123,32,.3); }
.stat.r { background:rgba(168,85,247,.12); color:#d09af8; border-color:rgba(168,85,247,.3); }
#irr-toggle-wrap { display:flex; align-items:center; gap:6px; background:rgba(255,255,255,.04); border:1px solid #2a4a6a; border-radius:8px; padding:5px 10px; }
.panel-label { font-size:.7rem; color:#a0c0e0; font-weight:600; white-space:nowrap; }
.toggle-switch { position:relative; width:32px; height:17px; cursor:pointer; flex-shrink:0; }
.toggle-switch input { opacity:0; width:0; height:0; position:absolute; }
.toggle-slider { position:absolute; inset:0; background:#1a3a5c; border-radius:17px; transition:.2s; border:1px solid #2a4a6a; }
.toggle-slider:before { content:''; position:absolute; width:11px; height:11px; left:2px; top:2px; background:#6a9aba; border-radius:50%; transition:.2s; }
.toggle-switch input:checked + .toggle-slider { background:#1a6e35; border-color:#2ea84f; }
.toggle-switch input:checked + .toggle-slider:before { transform:translateX(15px); background:#7af; }
.irr-note { font-size:.62rem; color:#5a8a6a; white-space:nowrap; }
#radius-panel { background:rgba(255,255,255,.04); border:1px solid #2a4a6a; border-radius:8px; padding:5px 10px; display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
.radius-btns { display:flex; gap:3px; flex-wrap:wrap; }
.r-btn { padding:3px 7px; font-size:.69rem; font-weight:700; border:1px solid #2a4a6a; border-radius:5px; background:#0d2035; color:#6a9aba; cursor:pointer; transition:all .18s; white-space:nowrap; }
.r-btn.active { background:#1a4a7a; border-color:#4a8aba; color:#c8e8ff; }
.r-btn:hover:not(.active) { background:#1a3a5c; color:#c0d8f0; }
.r-toggle { display:flex; align-items:center; gap:5px; }
.tog-label { font-size:.69rem; color:#a0c0e0; cursor:pointer; white-space:nowrap; }
#controls { background:#0e1e30; padding:7px 14px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; border-bottom:1px solid #1e3a54; }
#search { flex:1; min-width:160px; padding:6px 10px; border-radius:6px; border:1px solid #2a4a6a; background:#0d2035; color:#e8eaf0; font-size:.82rem; outline:none; }
#search::placeholder { color:#5a7a9a; }
#state-filter { padding:6px 8px; border-radius:6px; border:1px solid #2a4a6a; background:#0d2035; color:#e8eaf0; font-size:.8rem; cursor:pointer; outline:none; }
#count { font-size:.72rem; color:#6a9aba; margin-left:auto; white-space:nowrap; }
#map { position:absolute; left:0; right:0; bottom:0; }
#sidebar { display:none; position:fixed; right:0; width:280px; background:#0e1e30; border-left:1px solid #1e3a54; overflow-y:auto; z-index:1000; box-shadow:-4px 0 14px rgba(0,0,0,.5); }
#sidebar-header { padding:10px 13px; background:#0d1b2a; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #1e3a54; position:sticky; top:0; z-index:1; }
#sidebar-header h3 { font-size:.84rem; color:#a0d8b0; }
#close-btn { background:none; border:none; color:#6a9aba; font-size:1.1rem; cursor:pointer; padding:2px 5px; }
#close-btn:hover { color:#fff; }
.dealer-card { padding:10px 13px; border-bottom:1px solid #1a3050; cursor:pointer; transition:background .15s; border-left:3px solid transparent; }
.dealer-card.valley { border-left-color:#2ea84f; } .dealer-card.zimmatic { border-left-color:#e07b20; } .dealer-card.reinke { border-left-color:#a855f7; }
.dealer-card:hover { background:#1a3050; }
.dealer-card h4 { font-size:.79rem; font-weight:600; color:#c8e6ff; margin-bottom:2px; line-height:1.3; }
.dealer-card p { font-size:.69rem; color:#6a9aba; line-height:1.5; }
.dealer-card .phone { color:#6abf7a; }
.brand-tag { display:inline-block; font-size:.6rem; padding:1px 6px; border-radius:10px; margin-bottom:3px; font-weight:700; }
.brand-tag.valley { background:rgba(46,168,79,.2); color:#6abf7a; }
.brand-tag.zimmatic { background:rgba(224,123,32,.2); color:#f4a85a; }
.brand-tag.reinke { background:rgba(168,85,247,.2); color:#d09af8; }
.leaflet-popup-content-wrapper { background:#0e1e30; border:1px solid #2a4a6a; border-radius:8px; box-shadow:0 4px 18px rgba(0,0,0,.6); }
.leaflet-popup-tip { background:#0e1e30; }
.leaflet-popup-content { color:#e8eaf0; font-family:'Segoe UI',Arial,sans-serif; margin:10px 13px; min-width:180px; }
.popup-brand { font-size:.65rem; font-weight:700; padding:2px 7px; border-radius:10px; display:inline-block; margin-bottom:4px; }
.popup-brand.valley { background:rgba(46,168,79,.25); color:#6abf7a; }
.popup-brand.zimmatic { background:rgba(224,123,32,.25); color:#f4a85a; }
.popup-brand.reinke { background:rgba(168,85,247,.25); color:#d09af8; }
.popup-name { font-weight:700; font-size:.87rem; color:#c8e6ff; margin-bottom:3px; line-height:1.3; }
.popup-addr { font-size:.73rem; color:#a0c0e0; line-height:1.6; margin-bottom:2px; }
.popup-phone { font-size:.73rem; color:#6abf7a; }
.popup-dir { display:inline-block; margin-top:6px; padding:4px 11px; border-radius:4px; font-size:.7rem; color:#fff; text-decoration:none; }
.popup-dir.valley { background:#1a5c3a; } .popup-dir.zimmatic { background:#7a3a0a; } .popup-dir.reinke { background:#5a1a9a; }
#legend { position:absolute; bottom:24px; left:12px; z-index:800; background:rgba(13,27,42,.92); border:1px solid #2a4a6a; border-radius:8px; padding:8px 12px; font-size:.69rem; backdrop-filter:blur(6px); }
.leg-row { display:flex; align-items:center; gap:7px; margin-bottom:4px; }
.leg-row:last-child { margin-bottom:0; }
.leg-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.leg-ring { width:13px; height:13px; border-radius:50%; border:2px dashed; flex-shrink:0; background:transparent; }
#irr-legend-row { display:none; flex-direction:column; gap:3px; border-top:1px solid #2a4a6a; padding-top:6px; margin-top:4px; }
.irr-grad-wrap { display:flex; align-items:center; gap:5px; }
.leg-grad { width:90px; height:10px; border-radius:3px; }
.leaflet-tooltip { background:#0e1e30; border:1px solid #2a4a6a; color:#e8eaf0; font-size:.8rem; padding:6px 10px; border-radius:6px; }
</style>

var allData = { valley: valleyRaw, zimmatic: zimmaticRaw, reinke: reinkeRaw };
Object.keys(allData).forEach(function(b) { allData[b].forEach(function(d) { d.brand = b; }); });

var irrigatedByState = {"01": 60000, "02": 920000, "04": 1050000, "05": 550000, "06": 8200000, "08": 2900000, "09": 43000, "10": 110000, "12": 2000000, "13": 500000, "16": 3500000, "17": 740000, "18": 680000, "19": 760000, "20": 3000000, "21": 155000, "22": 730000, "23": 65000, "24": 115000, "25": 55000, "26": 410000, "27": 510000, "28": 630000, "29": 580000, "30": 2600000, "31": 8400000, "32": 720000, "33": 28000, "34": 110000, "35": 920000, "36": 390000, "37": 470000, "38": 1100000, "39": 130000, "40": 1700000, "41": 1850000, "42": 90000, "44": 7000, "45": 200000, "46": 700000, "47": 230000, "48": 5900000, "49": 1650000, "50": 22000, "51": 260000, "53": 1650000, "54": 36000, "55": 680000, "56": 1750000};
var maxAcres = Math.max.apply(null, Object.values(irrigatedByState));

var map = L.map('map', { center: [39.5, -98.5], zoom: 4 });
window._map = map;
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; OSM', maxZoom: 19
}).addTo(map);
setTimeout(setMapHeight, 100);

var irrLayer = null, irrVisible = false;
function irrFill(acres) {
  var t = Math.pow(acres / maxAcres, 0.42);
  return 'rgba(' + Math.round(20+t*10) + ',' + Math.round(80+t*50) + ',' + Math.round(180+t*75) + ',' + (0.12+t*0.62).toFixed(2) + ')';
}
async function buildIrrLayer() {
  var topoResp = await fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json');
  var topo = await topoResp.json();
  await new Promise(function(res) {
    if (window.topojson) { res(); return; }
    var s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js';
    s.onload = res; document.head.appendChild(s);
  });
  var geojson = topojson.feature(topo, topo.objects.states);
  irrLayer = L.geoJSON(geojson, {
    style: function(f) {
      var fips = f.id.toString().padStart(2,'0');
      return { fillColor: irrFill(irrigatedByState[fips]||0), fillOpacity:1, color:'rgba(120,200,255,0.2)', weight:0.7 };
    },
    onEachFeature: function(f, layer) {
      var fips = f.id.toString().padStart(2,'0');
      var acres = irrigatedByState[fips] || 0;
      layer.bindTooltip('<b style="color:#c8e6ff">' + f.properties.name + '</b><br>&#127793; <b style="color:#7adfa0">' + acres.toLocaleString() + '</b> irrigated acres<br><span style="font-size:.75em;color:#7aabb0">2022 USDA Census of Agriculture</span>', { sticky:true });
      layer.on('mouseover', function() { this.setStyle({ fillOpacity:0.85, weight:1.5, color:'rgba(150,220,255,0.5)' }); });
      layer.on('mouseout',  function() { irrLayer.resetStyle(this); });
    }
  });
  if (irrVisible) { irrLayer.addTo(map); irrLayer.bringToBack(); }
}
document.getElementById('irr-toggle').addEventListener('change', function() {
  irrVisible = this.checked;
  document.getElementById('irr-legend-row').style.display = irrVisible ? 'flex' : 'none';
  if (!irrLayer) { buildIrrLayer(); return; }
  if (irrVisible) { irrLayer.addTo(map); irrLayer.bringToBack(); } else { map.removeLayer(irrLayer); }
});

function makeIcon(c) {
  return L.divIcon({ className:'', iconSize:[22,30], iconAnchor:[11,30], popupAnchor:[0,-32],
    html:'<svg width="22" height="30" viewBox="0 0 22 30" xmlns="http://www.w3.org/2000/svg"><path d="M11 0C4.92 0 0 4.92 0 11c0 8.25 11 19 11 19S22 19.25 22 11C22 4.92 17.08 0 11 0z" fill="' + c + '" stroke="#fff" stroke-width="1.5"/><circle cx="11" cy="11" r="4.5" fill="#fff"/></svg>'
  });
}
var icons = { valley:makeIcon('#2ea84f'), zimmatic:makeIcon('#e07b20'), reinke:makeIcon('#a855f7') };

var RS = { 10:{s:'#44aaff'}, 20:{s:'#aaff44'}, 30:{s:'#ffaa44'}, 50:{s:'#ff44aa'}, 75:{s:'#cc88ff'}, 100:{s:'#ffee44'} };
var M2M = 1609.344;
var rLayer = L.layerGroup().addTo(map);
var selMiles = 10, showR = false;

function mkCluster(c1,c2) {
  return L.markerClusterGroup({ maxClusterRadius:40,
    iconCreateFunction: function(cl) {
      var c = cl.getChildCount(), sz = c<10?36:c<50?44:52;
      return L.divIcon({ className:'', iconSize:[sz,sz], iconAnchor:[sz/2,sz/2],
        html:'<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:linear-gradient(135deg,'+c1+','+c2+');border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:'+(sz>40?14:12)+'px;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.4)">'+c+'</div>'
      });
    }
  });
}
var clusters = { valley:mkCluster('#2ea84f','#1a6e35'), zimmatic:mkCluster('#e07b20','#9a4010'), reinke:mkCluster('#a855f7','#6b21c8') };
var brandActive = { valley:true, zimmatic:true, reinke:true };
var allMarkers = [], filtered = [];

var brandLabels = { valley:'Valley Irrigation', zimmatic:'Zimmatic', reinke:'Reinke' };
function buildPopup(d) {
  var url = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(d.full_address);
  return '<div class="popup-brand '+d.brand+'">'+brandLabels[d.brand]+'</div>' +
    '<div class="popup-name">'+d.name+'</div>' +
    '<div class="popup-addr">'+d.street+'<br>'+d.city+', '+d.state+' '+d.zip+'</div>' +
    (d.phone ? '<div class="popup-phone">&#128222; '+d.phone+'</div>' : '') +
    '<a class="popup-dir '+d.brand+'" href="'+url+'" target="_blank" rel="noopener">&#128205; Google Maps</a>';
}

function drawRadii(list) {
  rLayer.clearLayers();
  if (!showR || !list.length) { document.getElementById('leg-radius-row').style.display='none'; return; }
  var cfg = RS[selMiles];
  list.forEach(function(d) {
    L.circle([d.lat,d.lng], { radius:selMiles*M2M, color:cfg.s, weight:1.5, opacity:.8, fillColor:cfg.s, fillOpacity:.04, dashArray:'6 4', interactive:false }).addTo(rLayer);
  });
  document.getElementById('leg-ring-swatch').style.borderColor = cfg.s;
  document.getElementById('leg-label').textContent = selMiles + ' mi radius';
  document.getElementById('leg-radius-row').style.display = 'flex';
}

function renderMarkers(list) {
  Object.keys(clusters).forEach(function(b) { clusters[b].clearLayers(); map.removeLayer(clusters[b]); });
  allMarkers = [];
  list.forEach(function(d) {
    var m = L.marker([d.lat,d.lng], { icon:icons[d.brand] });
    m.bindPopup(buildPopup(d), { maxWidth:270 });
    m.dealerData = d; allMarkers.push(m);
    clusters[d.brand].addLayer(m);
  });
  Object.keys(clusters).forEach(function(b) {
    if (list.some(function(d) { return d.brand===b; })) map.addLayer(clusters[b]);
  });
  document.getElementById('count').textContent = 'Showing ' + list.length + ' dealer' + (list.length!==1?'s':'');
  drawRadii(list);
  if (irrLayer && irrVisible) irrLayer.bringToBack();
}

function getSource() {
  return Object.keys(allData).filter(function(b) { return brandActive[b]; }).reduce(function(a,b) { return a.concat(allData[b]); }, []);
}
function populateStateFilter(src) {
  var sel = document.getElementById('state-filter'), cur = sel.value;
  var states = src.map(function(d){return d.state;}).filter(function(v,i,a){return a.indexOf(v)===i;}).sort();
  sel.innerHTML = '<option value="">All States</option>';
  states.forEach(function(s) { var o=document.createElement('option'); o.value=s; o.textContent=s; sel.appendChild(o); });
  if (states.indexOf(cur) >= 0) sel.value = cur;
}
function applyFilters() {
  var q = document.getElementById('search').value.toLowerCase().trim();
  var st = document.getElementById('state-filter').value;
  filtered = getSource().filter(function(d) {
    var mq = !q || d.name.toLowerCase().indexOf(q)>=0 || d.city.toLowerCase().indexOf(q)>=0 || d.state.toLowerCase().indexOf(q)>=0;
    return mq && (!st || d.state===st);
  });
  renderMarkers(filtered);
  if (document.getElementById('sidebar').style.display==='block') renderSidebar(filtered);
}

function toggleBrand(brand, on) {
  brandActive[brand] = on;
  document.getElementById('chk-'+brand).classList.toggle('on', on);
  populateStateFilter(getSource());
  var states = getSource().map(function(d){return d.state;});
  if (states.indexOf(document.getElementById('state-filter').value) < 0) document.getElementById('state-filter').value='';
  applyFilters();
}
['valley','zimmatic','reinke'].forEach(function(brand) {
  document.getElementById('s-'+brand).addEventListener('click', function() {
    Object.keys(brandActive).forEach(function(b) {
      brandActive[b] = b===brand;
      document.getElementById('chk-'+b).querySelector('input').checked = b===brand;
      document.getElementById('chk-'+b).classList.toggle('on', b===brand);
    });
    populateStateFilter(getSource());
    document.getElementById('state-filter').value='';
    applyFilters(); renderSidebar(filtered);
  });
});

document.querySelectorAll('.r-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.r-btn').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active'); selMiles=parseInt(btn.dataset.miles); drawRadii(filtered);
  });
});
document.getElementById('radius-toggle').addEventListener('change', function() { showR=this.checked; drawRadii(filtered); });
document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('state-filter').addEventListener('change', applyFilters);

function renderSidebar(list) {
  document.getElementById('sidebar-list').innerHTML = list.map(function(d,i) {
    return '<div class="dealer-card '+d.brand+'" onclick="flyTo('+i+')">' +
      '<div><span class="brand-tag '+d.brand+'">'+(d.brand==='valley'?'Valley':d.brand==='zimmatic'?'Zimmatic':'Reinke')+'</span></div>' +
      '<h4>'+d.name+'</h4><p>'+d.city+', '+d.state+' '+d.zip+'</p>' +
      (d.phone?'<p class="phone">&#128222; '+d.phone+'</p>':'')+'</div>';
  }).join('');
  document.getElementById('sidebar-title').textContent = list.length+' Dealer'+(list.length!==1?'s':'');
  document.getElementById('sidebar').style.display = 'block';
}
function flyTo(idx) {
  var d = filtered[idx];
  map.flyTo([d.lat,d.lng], 12, {duration:1});
  setTimeout(function() { allMarkers.forEach(function(m) { if(m.dealerData===d) m.openPopup(); }); }, 1100);
}
document.getElementById('close-btn').addEventListener('click', function() { document.getElementById('sidebar').style.display='none'; });

populateStateFilter(getSource());
applyFilters();
</script>
</body>
