#map{height:calc(100vh - 105px)}

.dealer-card{padding:14px 16px;border-bottom:1px solid #1e3a54;cursor:pointer;transition:background .15s}

.leaflet-popup-content-wrapper{background:#122338;border:1px solid #2a4a6a;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.5)}
.leaflet-popup-tip{background:#122338}

// ── Map setup ──────────────────────────────────────────────
const map = L.map('map', {center:[39.5,-98.5], zoom:4});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://openstreetmap.org">OSM</a>',
  maxZoom: 19
}).addTo(map);

const greenIcon = L.divIcon({
  className: '',
  html: '<svg width="22" height="30" viewBox="0 0 22 30" xmlns="http://www.w3.org/2000/svg"><path d="M11 0C4.92 0 0 4.92 0 11c0 8.25 11 19 11 19S22 19.25 22 11C22 4.92 17.08 0 11 0z" fill="#2ea84f" stroke="#fff" stroke-width="1.5"/><circle cx="11" cy="11" r="4.5" fill="#fff"/></svg>',
  iconSize: [22,30], iconAnchor: [11,30], popupAnchor: [0,-32]
});

const clusters = L.markerClusterGroup({
  maxClusterRadius: 40,
  iconCreateFunction(cluster) {
    const c = cluster.getChildCount();
    const sz = c < 10 ? 36 : c < 50 ? 44 : 52;
    return L.divIcon({
      html: `<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:linear-gradient(135deg,#2ea84f,#1a6e35);border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:${sz>40?14:12}px;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.4)">${c}</div>`,
      className: '', iconSize: [sz,sz], iconAnchor: [sz/2,sz/2]
    });
  }
});

// ── State ──────────────────────────────────────────────────
let allMarkers = [];
let filtered = dealers.slice();

// ── Popup builder ──────────────────────────────────────────
function buildPopup(d) {
  const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(d.full_address)}`;
  return `<div class="popup-name">${d.name}</div>
<div class="popup-addr">${d.street}<br>${d.city}, ${d.state} ${d.zip}</div>
${d.phone ? `<div class="popup-phone">&#128222; ${d.phone}</div>` : ''}
<a class="popup-dir" href="${url}" target="_blank" rel="noopener">&#128205; Open in Google Maps</a>`;
}

// ── Render markers ─────────────────────────────────────────
function renderMarkers(list) {
  clusters.clearLayers();
  allMarkers = [];
  list.forEach(d => {
    const m = L.marker([d.lat, d.lng], {icon: greenIcon});
    m.bindPopup(buildPopup(d), {maxWidth: 260});
    m.dealerData = d;
    allMarkers.push(m);
    clusters.addLayer(m);
  });
  map.addLayer(clusters);
  document.getElementById('count').textContent = `Showing ${list.length} of 215 dealers`;
}

// ── Populate state filter ──────────────────────────────────
const states = [...new Set(dealers.map(d => d.state))].sort();
const sel = document.getElementById('state-filter');
states.forEach(s => {
  const o = document.createElement('option');
  o.value = s; o.textContent = s;
  sel.appendChild(o);
});

// ── Filter logic ───────────────────────────────────────────
function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const st = sel.value;
  filtered = dealers.filter(d => {
    const mq = !q || d.name.toLowerCase().includes(q) || d.city.toLowerCase().includes(q) || d.state.toLowerCase().includes(q);
    return mq && (!st || d.state === st);
  });
  renderMarkers(filtered);
  if (document.getElementById('sidebar').style.display === 'block') renderSidebar(filtered);
}

document.getElementById('search').addEventListener('input', applyFilters);
sel.addEventListener('change', applyFilters);

// ── Sidebar ────────────────────────────────────────────────
function renderSidebar(list) {
  document.getElementById('sidebar-list').innerHTML = list.map((d, i) =>
    `<div class="dealer-card" onclick="flyTo(${i})">
      <h4>${d.name}</h4>
      <p>${d.city}, ${d.state} ${d.zip}</p>
      ${d.phone ? `<p class="phone">&#128222; ${d.phone}</p>` : ''}
    </div>`
  ).join('');
  document.getElementById('sidebar-title').textContent = `${list.length} Dealer${list.length !== 1 ? 's' : ''}`;
  document.getElementById('sidebar').style.display = 'block';
}

function flyTo(idx) {
  const d = filtered[idx];
  map.flyTo([d.lat, d.lng], 13, {duration: 1});
  setTimeout(() => {
    allMarkers.forEach(m => { if (m.dealerData === d) m.openPopup(); });
  }, 1100);
}

document.getElementById('close-btn').addEventListener('click', () => {
  document.getElementById('sidebar').style.display = 'none';
});

document.getElementById('total-badge').addEventListener('click', () => renderSidebar(filtered));

// ── Init ───────────────────────────────────────────────────
renderMarkers(dealers);
</script>
