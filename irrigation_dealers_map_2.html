<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Irrigation Dealer Network – U.S. Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0d1b2a;color:#e8eaf0;overflow:hidden}

/* ── HEADER ────────────────────────────────────────────────── */
#header{background:linear-gradient(135deg,#0d2035 0%,#0d3d1e 100%);padding:8px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;box-shadow:0 2px 10px rgba(0,0,0,.6);border-bottom:1px solid #1e4a2a}
#logo-wrap{flex-shrink:0}
#logo-wrap img{height:44px;width:auto;display:block;filter:brightness(1.05)}
#header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex:1}

/* Brand toggles */
.brand-toggles{display:flex;gap:6px;flex-wrap:wrap}
.brand-check{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:8px;border:1px solid #2a4a6a;cursor:pointer;font-size:.75rem;font-weight:700;transition:all .2s;user-select:none;white-space:nowrap}
.brand-check input{display:none}
.brand-check .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;transition:all .2s}
.brand-check.valley{border-color:#2ea84f}
.brand-check.valley.on{background:rgba(46,168,79,.18)}
.brand-check.valley .dot{background:#2ea84f}
.brand-check.zimmatic{border-color:#e07b20}
.brand-check.zimmatic.on{background:rgba(224,123,32,.18)}
.brand-check.zimmatic .dot{background:#e07b20}
.brand-check.reinke{border-color:#a855f7}
.brand-check.reinke.on{background:rgba(168,85,247,.18)}
.brand-check.reinke .dot{background:#a855f7}
.brand-check:not(.on){opacity:.55}
.brand-check:not(.on) .dot{background:#555}

/* Stat pills */
.stats{display:flex;gap:6px;flex-wrap:wrap}
.stat{border-radius:20px;padding:3px 10px;font-size:.7rem;white-space:nowrap;cursor:pointer;border:1px solid transparent}
.stat.v{background:rgba(46,168,79,.12);color:#7adfa0;border-color:rgba(46,168,79,.3)}
.stat.z{background:rgba(224,123,32,.12);color:#f4a85a;border-color:rgba(224,123,32,.3)}
.stat.r{background:rgba(168,85,247,.12);color:#d09af8;border-color:rgba(168,85,247,.3)}

/* Radius panel */
#radius-panel{background:rgba(255,255,255,.04);border:1px solid #2a4a6a;border-radius:10px;padding:6px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
#radius-panel .panel-label{font-size:.71rem;color:#a0c0e0;font-weight:600;white-space:nowrap}
.radius-btns{display:flex;gap:3px;flex-wrap:wrap}
.r-btn{padding:4px 8px;font-size:.7rem;font-weight:700;border:1px solid #2a4a6a;border-radius:6px;background:#0d2035;color:#6a9aba;cursor:pointer;transition:all .18s;white-space:nowrap}
.r-btn.active{background:#1a4a7a;border-color:#4a8aba;color:#c8e8ff;box-shadow:0 0 5px rgba(74,138,186,.4)}
.r-btn:hover:not(.active){background:#1a3a5c;color:#c0d8f0}
.r-toggle{display:flex;align-items:center;gap:5px}
.r-toggle .tog-label{font-size:.71rem;color:#a0c0e0;cursor:pointer;white-space:nowrap}
.toggle-switch{position:relative;width:32px;height:17px;cursor:pointer;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;background:#1a3a5c;border-radius:17px;transition:.2s;border:1px solid #2a4a6a}
.toggle-slider:before{content:'';position:absolute;width:11px;height:11px;left:2px;top:2px;background:#6a9aba;border-radius:50%;transition:.2s}
.toggle-switch input:checked + .toggle-slider{background:#1a5c8a;border-color:#4a8aba}
.toggle-switch input:checked + .toggle-slider:before{transform:translateX(15px);background:#5af}

/* ── CONTROLS ──────────────────────────────────────────────── */
#controls{background:#0e1e30;padding:7px 16px;display:flex;gap:9px;align-items:center;flex-wrap:wrap;border-bottom:1px solid #1e3a54}
#search{flex:1;min-width:170px;padding:6px 11px;border-radius:6px;border:1px solid #2a4a6a;background:#0d2035;color:#e8eaf0;font-size:.83rem;outline:none}
#search::placeholder{color:#5a7a9a}
#state-filter{padding:6px 9px;border-radius:6px;border:1px solid #2a4a6a;background:#0d2035;color:#e8eaf0;font-size:.81rem;cursor:pointer;outline:none}
#count{font-size:.74rem;color:#6a9aba;margin-left:auto;white-space:nowrap}

/* ── MAP ───────────────────────────────────────────────────── */
#map{height:calc(100vh - 115px);position:relative}

/* ── SIDEBAR ───────────────────────────────────────────────── */
#sidebar{display:none;position:fixed;right:0;top:115px;width:288px;height:calc(100vh - 115px);background:#0e1e30;border-left:1px solid #1e3a54;overflow-y:auto;z-index:1000;box-shadow:-4px 0 14px rgba(0,0,0,.5)}
#sidebar-header{padding:10px 14px;background:#0d1b2a;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1e3a54;position:sticky;top:0;z-index:1}
#sidebar-header h3{font-size:.86rem;color:#a0d8b0}
#close-btn{background:none;border:none;color:#6a9aba;font-size:1.1rem;cursor:pointer;padding:2px 5px}
#close-btn:hover{color:#fff}
.dealer-card{padding:10px 14px;border-bottom:1px solid #1a3050;cursor:pointer;transition:background .15s;border-left:3px solid transparent}
.dealer-card.valley{border-left-color:#2ea84f}
.dealer-card.zimmatic{border-left-color:#e07b20}
.dealer-card.reinke{border-left-color:#a855f7}
.dealer-card:hover{background:#1a3050}
.dealer-card h4{font-size:.8rem;font-weight:600;color:#c8e6ff;margin-bottom:3px;line-height:1.3}
.dealer-card p{font-size:.7rem;color:#6a9aba;line-height:1.5}
.dealer-card .phone{color:#6abf7a}
.brand-tag{display:inline-block;font-size:.61rem;padding:1px 7px;border-radius:10px;margin-bottom:3px;font-weight:700}
.brand-tag.valley{background:rgba(46,168,79,.2);color:#6abf7a}
.brand-tag.zimmatic{background:rgba(224,123,32,.2);color:#f4a85a}
.brand-tag.reinke{background:rgba(168,85,247,.2);color:#d09af8}

/* ── POPUPS ────────────────────────────────────────────────── */
.leaflet-popup-content-wrapper{background:#0e1e30;border:1px solid #2a4a6a;border-radius:8px;box-shadow:0 4px 18px rgba(0,0,0,.6)}
.leaflet-popup-tip{background:#0e1e30}
.leaflet-popup-content{color:#e8eaf0;font-family:'Segoe UI',Arial,sans-serif;margin:11px 14px;min-width:185px}
.popup-brand{font-size:.66rem;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:5px}
.popup-brand.valley{background:rgba(46,168,79,.25);color:#6abf7a}
.popup-brand.zimmatic{background:rgba(224,123,32,.25);color:#f4a85a}
.popup-brand.reinke{background:rgba(168,85,247,.25);color:#d09af8}
.popup-name{font-weight:700;font-size:.88rem;color:#c8e6ff;margin-bottom:4px;line-height:1.3}
.popup-addr{font-size:.74rem;color:#a0c0e0;line-height:1.6;margin-bottom:3px}
.popup-phone{font-size:.74rem;color:#6abf7a;margin-bottom:2px}
.popup-dir{display:inline-block;margin-top:7px;padding:5px 12px;border-radius:4px;font-size:.71rem;color:#fff;text-decoration:none}
.popup-dir.valley{background:#1a5c3a}.popup-dir.valley:hover{background:#2a7a50}
.popup-dir.zimmatic{background:#7a3a0a}.popup-dir.zimmatic:hover{background:#9a5020}
.popup-dir.reinke{background:#5a1a9a}.popup-dir.reinke:hover{background:#7a3aba}

/* ── LEGEND ────────────────────────────────────────────────── */
#legend{position:absolute;bottom:26px;left:14px;z-index:800;background:rgba(13,27,42,.92);border:1px solid #2a4a6a;border-radius:8px;padding:9px 13px;font-size:.71rem;backdrop-filter:blur(6px)}
.leg-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.leg-row:last-child{margin-bottom:0}
.leg-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.leg-ring{width:14px;height:14px;border-radius:50%;border:2px dashed;flex-shrink:0;background:transparent}
#aerial-toggle-btn{padding:5px 12px;border-radius:6px;border:1px solid #2a4a6a;background:#0d2035;color:#6a9aba;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .18s;white-space:nowrap}
#aerial-toggle-btn.aerial{background:#1a4a3a;border-color:#2ea84f;color:#7adfa0}
</style>
</head>

<div id="header">
  <div id="logo-wrap">
    <img src="logo.jpg" alt="American Irrigation"/>
  </div>
  <div id="header-right">
    <div class="brand-toggles">
      <label class="brand-check valley on" id="chk-valley">
        <input type="checkbox" checked onchange="toggleBrand('valley',this.checked)"/>
        <span class="dot"></span> Valley
      </label>
      <label class="brand-check zimmatic on" id="chk-zimmatic">
        <input type="checkbox" checked onchange="toggleBrand('zimmatic',this.checked)"/>
        <span class="dot"></span> Zimmatic
      </label>
      <label class="brand-check reinke on" id="chk-reinke">
        <input type="checkbox" checked onchange="toggleBrand('reinke',this.checked)"/>
        <span class="dot"></span> Reinke
      </label>
    </div>
    <div class="stats">
      <span class="stat v" id="s-valley" title="Show Valley list">&#9632; Valley: 215</span>
      <span class="stat z" id="s-zimmatic" title="Show Zimmatic list">&#9632; Zimmatic: 83</span>
      <span class="stat r" id="s-reinke" title="Show Reinke list">&#9632; Reinke: 231</span>
    </div>
    <div id="radius-panel">
      <span class="panel-label">&#9711; Radius:</span>
      <div class="radius-btns">
        <button class="r-btn" data-miles="10">10</button>
        <button class="r-btn" data-miles="20">20</button>
        <button class="r-btn" data-miles="30">30</button>
        <button class="r-btn" data-miles="50">50</button>
        <button class="r-btn" data-miles="75">75</button>
        <button class="r-btn" data-miles="100">100</button>
      </div>
      <span style="font-size:.66rem;color:#5a7a9a">mi</span>
      <div class="r-toggle">
        <label class="toggle-switch">
          <input type="checkbox" id="radius-toggle"/>
          <span class="toggle-slider"></span>
        </label>
        <label for="radius-toggle" class="tog-label">Circles</label>
      </div>
    </div>
  </div>
</div>

<div id="controls">
  <input type="text" id="search" placeholder="Search dealer name, city, or state&#8230;"/>
  <select id="state-filter"><option value="">All States</option></select>
  <span id="count"></span>
  <button id="aerial-toggle-btn" title="Toggle aerial imagery">&#9728; Aerial</button>
</div>

<div id="map">
  <div id="legend">
    <div class="leg-row"><span class="leg-dot" style="background:#2ea84f"></span> Valley Irrigation</div>
    <div class="leg-row"><span class="leg-dot" style="background:#e07b20"></span> Zimmatic</div>
    <div class="leg-row"><span class="leg-dot" style="background:#a855f7"></span> Reinke</div>
    <div class="leg-row" id="leg-radius" style="display:none">
      <span class="leg-ring" id="leg-ring-swatch"></span>
      <span id="leg-label">10 mi radius</span>
    </div>
  </div>
</div>

<div id="sidebar">
  <div id="sidebar-header">
    <h3 id="sidebar-title">Dealers</h3>
    <button id="close-btn">&#x2715;</button>
  </div>
  <div id="sidebar-list"></div>
</div>

  return `<div class="popup-brand ${d.brand}">${labels[d.brand]}</div>

<a class="popup-dir ${d.brand}" href="${url}" target="_blank" rel="noopener">&#128205; Google Maps</a>`;
}

function drawRadii(list) {
  radiusLayer.clearLayers();
  if (!showRadii || !list.length) {
    document.getElementById('leg-radius').style.display = 'none';
    return;
  }
  const cfg = RADIUS_STYLES[selectedMiles];
  list.forEach(d => L.circle([d.lat,d.lng], {
    radius: selectedMiles*MILES_TO_M, color:cfg.stroke, weight:1.5,
    opacity:.8, fillColor:cfg.stroke, fillOpacity:cfg.fillOpacity,
    dashArray:'6 4', interactive:false
  }).addTo(radiusLayer));
  document.getElementById('leg-ring-swatch').style.borderColor = cfg.stroke;
  document.getElementById('leg-label').textContent = `${selectedMiles} mi radius`;
  document.getElementById('leg-radius').style.display = 'flex';
}

// ── RENDER ────────────────────────────────────────────────────
function renderMarkers(list) {
  Object.values(clusters).forEach(cl => { cl.clearLayers(); map.removeLayer(cl); });
  allMarkers = [];
  list.forEach(d => {
    const m = L.marker([d.lat,d.lng], {icon:icons[d.brand]});
    m.bindPopup(buildPopup(d), {maxWidth:275});
    m.on('click', () => { renderSidebar(filtered); });
    m.dealerData = d;
    allMarkers.push(m);
    clusters[d.brand].addLayer(m);
  });
  Object.entries(clusters).forEach(([brand,cl]) => {
    if (list.some(d => d.brand===brand)) map.addLayer(cl);
  });
  document.getElementById('count').textContent = `Showing ${list.length} dealer${list.length!==1?'s':''}`;
  drawRadii(list);
}

// ── STATE FILTER ──────────────────────────────────────────────
function getSource() {
  return Object.entries(allData)
    .filter(([b]) => brandActive[b])
    .flatMap(([,arr]) => arr);
}

function populateStateFilter(src) {
  const sel = document.getElementById('state-filter');
  const cur = sel.value;
  const states = [...new Set(src.map(d => d.state))].sort();
  sel.innerHTML = '<option value="">All States</option>';
  states.forEach(s => { const o=document.createElement('option'); o.value=s; o.textContent=s; sel.appendChild(o); });
  if (states.includes(cur)) sel.value = cur;
}

function applyFilters() {
  const q  = document.getElementById('search').value.toLowerCase().trim();
  const st = document.getElementById('state-filter').value;
  const src = getSource();
  filtered = src.filter(d => {
    const mq = !q || d.name.toLowerCase().includes(q) || d.city.toLowerCase().includes(q) || d.state.toLowerCase().includes(q);
    return mq && (!st || d.state===st);
  });
  renderMarkers(filtered);
  if (document.getElementById('sidebar').style.display==='block') renderSidebar(filtered);
}

// ── BRAND CHECKBOXES ──────────────────────────────────────────
function toggleBrand(brand, on) {
  brandActive[brand] = on;
  document.getElementById(`chk-${brand}`).classList.toggle('on', on);
  populateStateFilter(getSource());
  const curState = document.getElementById('state-filter').value;
  const avail = [...new Set(getSource().map(d=>d.state))];
  if (!avail.includes(curState)) document.getElementById('state-filter').value='';
  applyFilters();
}

// ── STAT PILL SIDEBAR SHORTCUT ────────────────────────────────
['valley','zimmatic','reinke'].forEach(brand => {
  document.getElementById(`s-${brand}`).addEventListener('click', () => {
    // Isolate this brand
    Object.keys(brandActive).forEach(b => {
      brandActive[b] = b===brand;
      document.getElementById(`chk-${b}`).querySelector('input').checked = b===brand;
      document.getElementById(`chk-${b}`).classList.toggle('on', b===brand);
    });
    populateStateFilter(getSource());
    document.getElementById('state-filter').value='';
    applyFilters();
    renderSidebar(filtered);
  });
});

// ── RADIUS CONTROLS ───────────────────────────────────────────
document.querySelectorAll('.r-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.r-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    selectedMiles = parseInt(btn.dataset.miles);
    drawRadii(filtered);
  });
});
document.getElementById('radius-toggle').addEventListener('change', function() {
  showRadii = this.checked;
  drawRadii(filtered);
});

// ── SEARCH / FILTER ───────────────────────────────────────────
document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('state-filter').addEventListener('change', applyFilters);

// ── SIDEBAR ───────────────────────────────────────────────────
const brandLabels = {valley:'Valley', zimmatic:'Zimmatic', reinke:'Reinke'};
function renderSidebar(list) {
  document.getElementById('sidebar-list').innerHTML = list.map((d,i) => `
    <div class="dealer-card ${d.brand}" onclick="flyTo(${i})">
      <div><span class="brand-tag ${d.brand}">${brandLabels[d.brand]}</span></div>
      <h4>${d.name}</h4>
      <p>${d.city}, ${d.state} ${d.zip}</p>
      ${d.phone ? `<p class="phone">&#128222; ${d.phone}</p>` : ''}
    </div>`).join('');
  document.getElementById('sidebar-title').textContent = `${list.length} Dealer${list.length!==1?'s':''}`;
  document.getElementById('sidebar').style.display = 'block';
}
function flyTo(idx) {
  const d = filtered[idx];
  const marker = allMarkers.find(m => m.dealerData === d);
  if (!marker) return;
  clusters[d.brand].zoomToShowLayer(marker, () => marker.openPopup());
}
document.getElementById('close-btn').addEventListener('click', () => {
  document.getElementById('sidebar').style.display = 'none';
});

// ── INIT ──────────────────────────────────────────────────────
document.getElementById('aerial-toggle-btn').addEventListener('click', function() {
  isAerial = !isAerial;
  if (isAerial) {
    map.removeLayer(darkLayer);
    aerialLayer.addTo(map);
    this.classList.add('aerial');
    this.textContent = 'Dark Map';
  } else {
    map.removeLayer(aerialLayer);
    darkLayer.addTo(map);
    this.classList.remove('aerial');
    this.textContent = String.fromCharCode(9728) + ' Aerial';
  }
});
// ── PIVOT LAYER (OpenStreetMap / Overpass) ──────────────────────────────
const pivotLayer = L.layerGroup();
let pivotsLoaded = false;
let showPivots = false;

async function loadPivots() {
  const btn = document.getElementById('pivot-toggle-btn');
  btn.textContent = String.fromCharCode(8987) + ' Loading...';
  btn.disabled = true;
  const query = '[out:json][timeout:90];(way["man_made"="pivot_irrigation"](24,-125,50,-65);node["man_made"="pivot_irrigation"](24,-125,50,-65);relation["man_made"="pivot_irrigation"](24,-125,50,-65););out center;';
  try {
    const res = await fetch('https://overpass-api.de/api/interpreter', {method:'POST', body:query});
    const data = await res.json();
    data.elements.forEach(el => {
      const lat = el.lat != null ? el.lat : (el.center ? el.center.lat : null);
      const lng = el.lon != null ? el.lon : (el.center ? el.center.lon : null);
      if (lat == null || lng == null) return;
      const name = (el.tags && el.tags.name) ? el.tags.name : 'Center Pivot';
      L.circleMarker([lat, lng], {
        radius:5, color:'#00d4ff', fillColor:'#00d4ff',
        fillOpacity:0.45, weight:1.5, interactive:true
      }).bindPopup('<b>' + name + '</b><br><small style="color:#a0c0e0">Center Pivot Irrigation<br>Source: OpenStreetMap</small>').addTo(pivotLayer);
    });
    pivotsLoaded = true;
    showPivots = true;
    pivotLayer.addTo(map);
    btn.disabled = false;
    btn.textContent = String.fromCharCode(9711) + ' Pivots (' + data.elements.length + ')';
    btn.classList.add('pivot-on');
    document.getElementById('leg-pivot').style.display = 'flex';
  } catch(e) {
    btn.disabled = false;
    btn.textContent = String.fromCharCode(9711) + ' Pivots (error)';
    console.error('Overpass error:', e);
  }
}

document.getElementById('pivot-toggle-btn').addEventListener('click', function() {
  if (!pivotsLoaded) { loadPivots(); return; }
  showPivots = !showPivots;
  if (showPivots) {
    pivotLayer.addTo(map);
    this.classList.add('pivot-on');
    document.getElementById('leg-pivot').style.display = 'flex';
  } else {
    map.removeLayer(pivotLayer);
    this.classList.remove('pivot-on');
    document.getElementById('leg-pivot').style.display = 'none';
  }
});
populateStateFilter(getSource());
applyFilters();
</script>
</body>
