<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Irrigation Dealer Network – U.S. Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0d1b2a;color:#e8eaf0;overflow:hidden}

/* ── HEADER ────────────────────────────────────────────────── */
#header{background:linear-gradient(135deg,#0d2035 0%,#0d3d1e 100%);padding:8px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;box-shadow:0 2px 10px rgba(0,0,0,.6);border-bottom:1px solid #1e4a2a}
#logo-wrap{flex-shrink:0}
#logo-wrap img{height:44px;width:auto;display:block;filter:brightness(1.05)}
#header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex:1}

/* Brand toggles */
.brand-toggles{display:flex;gap:6px;flex-wrap:wrap}
.brand-check{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:8px;border:1px solid #2a4a6a;cursor:pointer;font-size:.75rem;font-weight:700;transition:all .2s;user-select:none;white-space:nowrap}
.brand-check input{display:none}
.brand-check .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;transition:all .2s}
.brand-check.valley{border-color:#2ea84f}
.brand-check.valley.on{background:rgba(46,168,79,.18)}
.brand-check.valley .dot{background:#2ea84f}
.brand-check.zimmatic{border-color:#e07b20}
.brand-check.zimmatic.on{background:rgba(224,123,32,.18)}
.brand-check.zimmatic .dot{background:#e07b20}
.brand-check.reinke{border-color:#a855f7}
.brand-check.reinke.on{background:rgba(168,85,247,.18)}
.brand-check.reinke .dot{background:#a855f7}
.brand-check:not(.on){opacity:.55}
.brand-check:not(.on) .dot{background:#555}

/* Stat pills */
.stats{display:flex;gap:6px;flex-wrap:wrap}
.stat{border-radius:20px;padding:3px 10px;font-size:.7rem;white-space:nowrap;cursor:pointer;border:1px solid transparent}
.stat.v{background:rgba(46,168,79,.12);color:#7adfa0;border-color:rgba(46,168,79,.3)}
.stat.z{background:rgba(224,123,32,.12);color:#f4a85a;border-color:rgba(224,123,32,.3)}
.stat.r{background:rgba(168,85,247,.12);color:#d09af8;border-color:rgba(168,85,247,.3)}

/* Radius panel */
#radius-panel{background:rgba(255,255,255,.04);border:1px solid #2a4a6a;border-radius:10px;padding:6px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
#radius-panel .panel-label{font-size:.71rem;color:#a0c0e0;font-weight:600;white-space:nowrap}
.radius-btns{display:flex;gap:3px;flex-wrap:wrap}
.r-btn{padding:4px 8px;font-size:.7rem;font-weight:700;border:1px solid #2a4a6a;border-radius:6px;background:#0d2035;color:#6a9aba;cursor:pointer;transition:all .18s;white-space:nowrap}
.r-btn.active{background:#1a4a7a;border-color:#4a8aba;color:#c8e8ff;box-shadow:0 0 5px rgba(74,138,186,.4)}
.r-btn:hover:not(.active){background:#1a3a5c;color:#c0d8f0}
.r-toggle{display:flex;align-items:center;gap:5px}
.r-toggle .tog-label{font-size:.71rem;color:#a0c0e0;cursor:pointer;white-space:nowrap}
.toggle-switch{position:relative;width:32px;height:17px;cursor:pointer;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;background:#1a3a5c;border-radius:17px;transition:.2s;border:1px solid #2a4a6a}
.toggle-slider:before{content:'';position:absolute;width:11px;height:11px;left:2px;top:2px;background:#6a9aba;border-radius:50%;transition:.2s}
.toggle-switch input:checked + .toggle-slider{background:#1a5c8a;border-color:#4a8aba}
.toggle-switch input:checked + .toggle-slider:before{transform:translateX(15px);background:#5af}

/* ── CONTROLS ──────────────────────────────────────────────── */
#controls{background:#0e1e30;padding:7px 16px;display:flex;gap:9px;align-items:center;flex-wrap:wrap;border-bottom:1px solid #1e3a54}
#search{flex:1;min-width:170px;padding:6px 11px;border-radius:6px;border:1px solid #2a4a6a;background:#0d2035;color:#e8eaf0;font-size:.83rem;outline:none}
#search::placeholder{color:#5a7a9a}
#state-filter{padding:6px 9px;border-radius:6px;border:1px solid #2a4a6a;background:#0d2035;color:#e8eaf0;font-size:.81rem;cursor:pointer;outline:none}
#count{font-size:.74rem;color:#6a9aba;margin-left:auto;white-space:nowrap}

/* ── MAP ───────────────────────────────────────────────────── */
#map{height:calc(100vh - 115px);position:relative}

/* ── SIDEBAR ───────────────────────────────────────────────── */
#sidebar{display:none;position:fixed;right:0;top:115px;width:288px;height:calc(100vh - 115px);background:#0e1e30;border-left:1px solid #1e3a54;overflow-y:auto;z-index:1000;box-shadow:-4px 0 14px rgba(0,0,0,.5)}
#sidebar-header{padding:10px 14px;background:#0d1b2a;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1e3a54;position:sticky;top:0;z-index:1}
#sidebar-header h3{font-size:.86rem;color:#a0d8b0}
#close-btn{background:none;border:none;color:#6a9aba;font-size:1.1rem;cursor:pointer;padding:2px 5px}
#close-btn:hover{color:#fff}
.dealer-card{padding:10px 14px;border-bottom:1px solid #1a3050;cursor:pointer;transition:background .15s;border-left:3px solid transparent}
.dealer-card.valley{border-left-color:#2ea84f}
.dealer-card.zimmatic{border-left-color:#e07b20}
.dealer-card.reinke{border-left-color:#a855f7}
.dealer-card:hover{background:#1a3050}
.dealer-card h4{font-size:.8rem;font-weight:600;color:#c8e6ff;margin-bottom:3px;line-height:1.3}
.dealer-card p{font-size:.7rem;color:#6a9aba;line-height:1.5}
.dealer-card .phone{color:#6abf7a}
.brand-tag{display:inline-block;font-size:.61rem;padding:1px 7px;border-radius:10px;margin-bottom:3px;font-weight:700}
.brand-tag.valley{background:rgba(46,168,79,.2);color:#6abf7a}
.brand-tag.zimmatic{background:rgba(224,123,32,.2);color:#f4a85a}
.brand-tag.reinke{background:rgba(168,85,247,.2);color:#d09af8}

/* ── POPUPS ────────────────────────────────────────────────── */
.leaflet-popup-content-wrapper{background:#0e1e30;border:1px solid #2a4a6a;border-radius:8px;box-shadow:0 4px 18px rgba(0,0,0,.6)}
.leaflet-popup-tip{background:#0e1e30}
.leaflet-popup-content{color:#e8eaf0;font-family:'Segoe UI',Arial,sans-serif;margin:11px 14px;min-width:185px}
.popup-brand{font-size:.66rem;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:5px}
.popup-brand.valley{background:rgba(46,168,79,.25);color:#6abf7a}
.popup-brand.zimmatic{background:rgba(224,123,32,.25);color:#f4a85a}
.popup-brand.reinke{background:rgba(168,85,247,.25);color:#d09af8}
.popup-name{font-weight:700;font-size:.88rem;color:#c8e6ff;margin-bottom:4px;line-height:1.3}
.popup-addr{font-size:.74rem;color:#a0c0e0;line-height:1.6;margin-bottom:3px}
.popup-phone{font-size:.74rem;color:#6abf7a;margin-bottom:2px}
.popup-dir{display:inline-block;margin-top:7px;padding:5px 12px;border-radius:4px;font-size:.71rem;color:#fff;text-decoration:none}
.popup-dir.valley{background:#1a5c3a}.popup-dir.valley:hover{background:#2a7a50}
.popup-dir.zimmatic{background:#7a3a0a}.popup-dir.zimmatic:hover{background:#9a5020}
.popup-dir.reinke{background:#5a1a9a}.popup-dir.reinke:hover{background:#7a3aba}

/* ── LEGEND ────────────────────────────────────────────────── */
#legend{position:absolute;bottom:26px;left:14px;z-index:800;background:rgba(13,27,42,.92);border:1px solid #2a4a6a;border-radius:8px;padding:9px 13px;font-size:.71rem;backdrop-filter:blur(6px)}
.leg-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.leg-row:last-child{margin-bottom:0}
.leg-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.leg-ring{width:14px;height:14px;border-radius:50%;border:2px dashed;flex-shrink:0;background:transparent}
#aerial-toggle-btn{padding:5px 12px;border-radius:6px;border:1px solid #2a4a6a;background:#0d2035;color:#6a9aba;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .18s;white-space:nowrap}
#aerial-toggle-btn.aerial{background:#1a4a3a;border-color:#2ea84f;color:#7adfa0}
#choro-btn{padding:5px 12px;border-radius:6px;border:1px solid #2a4a6a;background:#0d2035;color:#6a9aba;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .18s;white-space:nowrap}
#choro-btn.choro-on{background:#0d2a1a;border-color:#6abf7a;color:#6abf7a}
#choro-btn:disabled{opacity:.55;cursor:wait}
#underserved-btn{padding:5px 12px;border-radius:6px;border:1px solid #2a4a6a;background:#0d2035;color:#6a9aba;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .18s;white-space:nowrap}
#underserved-btn.on{background:#3a1a0a;border-color:#cc4400;color:#ff9955}
#underserved-radius-panel{display:none;align-items:center;gap:5px;padding:3px 8px;background:rgba(200,80,0,.08);border:1px solid #5a2200;border-radius:6px}
#underserved-radius-panel .u-label{font-size:.68rem;color:#cc7744;white-space:nowrap}
.u-btn{padding:3px 7px;font-size:.68rem;font-weight:700;border:1px solid #552200;border-radius:5px;background:#1a0a05;color:#cc6633;cursor:pointer;transition:all .15s}
.u-btn.active{background:#5a2010;border-color:#cc4400;color:#ffaa55}
#leg-choro{display:none;flex-direction:column;gap:2px;margin-top:4px;padding-top:4px;border-top:1px solid #2a4a6a}
#leg-choro .choro-title{font-size:.63rem;color:#a0c0e0;margin-bottom:2px}
.choro-swatch{display:flex;align-items:center;gap:6px;font-size:.62rem;color:#c8e6ff}
.choro-box{width:12px;height:10px;border-radius:2px;flex-shrink:0}
</style>
</head>

<div id="header">
  <div id="logo-wrap">
    <img src="logo.jpg" alt="American Irrigation"/>
  </div>

    <div class="brand-toggles">
      <label class="brand-check valley on" id="chk-valley">
        <input type="checkbox" checked onchange="toggleBrand('valley',this.checked)"/>
        <span class="dot"></span> Valley
      </label>
      <label class="brand-check zimmatic on" id="chk-zimmatic">
        <input type="checkbox" checked onchange="toggleBrand('zimmatic',this.checked)"/>
        <span class="dot"></span> Zimmatic
      </label>
      <label class="brand-check reinke on" id="chk-reinke">
        <input type="checkbox" checked onchange="toggleBrand('reinke',this.checked)"/>
        <span class="dot"></span> Reinke
      </label>
    </div>
    <div class="stats">
      <span class="stat v" id="s-valley" title="Show Valley list">&#9632; Valley: 239</span>
      <span class="stat z" id="s-zimmatic" title="Show Zimmatic list">&#9632; Zimmatic: 227</span>
      <span class="stat r" id="s-reinke" title="Show Reinke list">&#9632; Reinke: 270</span>
    </div>
    <div id="radius-panel">
      <span class="panel-label">&#9711; Radius:</span>
      <div class="radius-btns">
        <button class="r-btn" data-miles="10">10</button>
        <button class="r-btn" data-miles="20">20</button>
        <button class="r-btn" data-miles="30">30</button>
        <button class="r-btn" data-miles="50">50</button>
        <button class="r-btn" data-miles="75">75</button>
        <button class="r-btn" data-miles="100">100</button>
      </div>
      <span style="font-size:.66rem;color:#5a7a9a">mi</span>
      <div class="r-toggle">
        <label class="toggle-switch">
          <input type="checkbox" id="radius-toggle"/>
          <span class="toggle-slider"></span>
        </label>
        <label for="radius-toggle" class="tog-label">Circles</label>
      </div>
    </div>
  </div>
</div>

<div id="controls">
  <input type="text" id="search" placeholder="Search dealer name, city, or state&#8230;"/>
  <select id="state-filter"><option value="">All States</option></select>
  <span id="count"></span>
  <button id="aerial-toggle-btn" title="Toggle aerial imagery">&#9728; Aerial</button>
  <button id="choro-btn" title="Show irrigated land by state (USDA 2017)">&#127807; Irrigated</button>
  <button id="underserved-btn" title="Highlight counties with irrigated farmland far from any dealer">&#9888; Underserved</button>
  <div id="underserved-radius-panel">
    <span class="u-label">Dealer gap &gt;</span>
    <button class="u-btn" data-mi="25">25 mi</button>
    <button class="u-btn active" data-mi="50">50 mi</button>
    <button class="u-btn" data-mi="75">75 mi</button>
    <button class="u-btn" data-mi="100">100 mi</button>
  </div>
</div>

<div id="map">
  <div id="legend">
    <div class="leg-row"><span class="leg-dot" style="background:#2ea84f"></span> Valley Irrigation</div>
    <div class="leg-row"><span class="leg-dot" style="background:#e07b20"></span> Zimmatic</div>
    <div class="leg-row"><span class="leg-dot" style="background:#a855f7"></span> Reinke</div>
    <div id="leg-underserved" style="display:none">
      <div class="choro-title" style="color:#ff9955">Underserved Counties</div>
      <div class="choro-swatch"><span class="choro-box" style="background:rgba(255,80,0,.5);border:1px solid #cc3300"></span> &gt;5k acres, no dealer nearby</div>
    </div>
    <div id="leg-choro">
      <div class="choro-title">Irrigated Acres (USDA 2022)</div>
      <div class="choro-swatch"><span class="choro-box" style="background:#0d4a1a"></span> 5M+ acres</div>
      <div class="choro-swatch"><span class="choro-box" style="background:#1a6e35"></span> 2–5M acres</div>
      <div class="choro-swatch"><span class="choro-box" style="background:#2ea84f"></span> 1–2M acres</div>
      <div class="choro-swatch"><span class="choro-box" style="background:#6abf7a"></span> 500k–1M</div>
      <div class="choro-swatch"><span class="choro-box" style="background:#a8d8b0"></span> 100–500k</div>
      <div class="choro-swatch"><span class="choro-box" style="background:#d4ead8"></span> &lt;100k acres</div>
    </div>
    <div class="leg-row" id="leg-radius" style="display:none">
      <span class="leg-ring" id="leg-ring-swatch"></span>
      <span id="leg-label">10 mi radius</span>
    </div>
  </div>
</div>

<div id="sidebar">
  <div id="sidebar-header">
    <h3 id="sidebar-title">Dealers</h3>
    <button id="close-btn">&#x2715;</button>
  </div>
  <div id="sidebar-list"></div>
</div>

Object.entries(allData).forEach(([brand,arr]) => arr.forEach(d => d.brand = brand));

// ── MAP ──────────────────────────────────────────────────────
const map = L.map('map', {center:[39.5,-98.5], zoom:4});
const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://openstreetmap.org">OSM</a>',
  maxZoom:19
});
const aerialLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution:'&copy; <a href="https://www.esri.com/">Esri</a>',
  maxZoom:19
});
let isAerial = false;
darkLayer.addTo(map);

// ── ICONS ─────────────────────────────────────────────────────
function makeIcon(color) {
  return L.divIcon({
    className:'',
    html:`<svg width="22" height="30" viewBox="0 0 22 30" xmlns="http://www.w3.org/2000/svg"><path d="M11 0C4.92 0 0 4.92 0 11c0 8.25 11 19 11 19S22 19.25 22 11C22 4.92 17.08 0 11 0z" fill="${color}" stroke="#fff" stroke-width="1.5"/><circle cx="11" cy="11" r="4.5" fill="#fff"/></svg>`,
    iconSize:[22,30], iconAnchor:[11,30], popupAnchor:[0,-32]
  });
}
const icons = {
  valley:   makeIcon('#2ea84f'),
  zimmatic: makeIcon('#e07b20'),
  reinke:   makeIcon('#a855f7')
};

// ── RADIUS ───────────────────────────────────────────────────
const RADIUS_STYLES = {
  10:  {stroke:'#44aaff', fillOpacity:.05},
  20:  {stroke:'#aaff44', fillOpacity:.04},
  30:  {stroke:'#ffaa44', fillOpacity:.04},
  50:  {stroke:'#ff44aa', fillOpacity:.04},
  75:  {stroke:'#cc88ff', fillOpacity:.04},
  100: {stroke:'#ffee44', fillOpacity:.03},
};
const MILES_TO_M = 1609.344;
const radiusLayer = L.layerGroup().addTo(map);

// ── STATE ─────────────────────────────────────────────────────
const brandActive = {valley:true, zimmatic:true, reinke:true};
let selectedMiles = 10;
let showRadii = false;
let allMarkers = [];
let filtered = [];

// ── CLUSTERS ─────────────────────────────────────────────────
const clusterCfg = {
  valley:   ['#2ea84f','#1a6e35'],
  zimmatic: ['#e07b20','#9a4010'],
  reinke:   ['#a855f7','#6b21c8']
};
const clusters = {};
Object.entries(clusterCfg).forEach(([brand,[c1,c2]]) => {
  clusters[brand] = L.markerClusterGroup({
    maxClusterRadius:40,
    iconCreateFunction(cluster) {
      const c=cluster.getChildCount(), sz=c<10?36:c<50?44:52;
      return L.divIcon({
        html:`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:linear-gradient(135deg,${c1},${c2});border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:${sz>40?14:12}px;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.4)">${c}</div>`,
        className:'', iconSize:[sz,sz], iconAnchor:[sz/2,sz/2]
      });
    }
  });
});

// ── POPUP ─────────────────────────────────────────────────────
function buildPopup(d) {
  const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(d.full_address)}`;
  const labels = {valley:'Valley Irrigation', zimmatic:'Zimmatic', reinke:'Reinke'};
  return `<div class="popup-brand ${d.brand}">${labels[d.brand]}</div>
<div class="popup-name">${d.name}</div>
<div class="popup-addr">${d.street}<br>${d.city}, ${d.state} ${d.zip}</div>
${d.phone ? `<div class="popup-phone">&#128222; ${d.phone}</div>` : ''}
<a class="popup-dir ${d.brand}" href="${url}" target="_blank" rel="noopener">&#128205; Google Maps</a>`;
}

// ── DRAW RADII ────────────────────────────────────────────────
function drawRadii(list) {
  radiusLayer.clearLayers();
  if (!showRadii || !list.length) {
    document.getElementById('leg-radius').style.display = 'none';
    return;
  }
  const cfg = RADIUS_STYLES[selectedMiles];
  list.forEach(d => L.circle([d.lat,d.lng], {
    radius: selectedMiles*MILES_TO_M, color:cfg.stroke, weight:1.5,
    opacity:.8, fillColor:cfg.stroke, fillOpacity:cfg.fillOpacity,
    dashArray:'6 4', interactive:false
  }).addTo(radiusLayer));
  document.getElementById('leg-ring-swatch').style.borderColor = cfg.stroke;
  document.getElementById('leg-label').textContent = `${selectedMiles} mi radius`;
  document.getElementById('leg-radius').style.display = 'flex';
}

// ── RENDER ────────────────────────────────────────────────────
function renderMarkers(list) {
  Object.values(clusters).forEach(cl => { cl.clearLayers(); map.removeLayer(cl); });
  allMarkers = [];
  list.forEach(d => {
    const m = L.marker([d.lat,d.lng], {icon:icons[d.brand]});
    m.bindPopup(buildPopup(d), {maxWidth:275});
    m.on('click', () => { renderSidebar(filtered); });
    m.dealerData = d;
    allMarkers.push(m);
    clusters[d.brand].addLayer(m);
  });
  Object.entries(clusters).forEach(([brand,cl]) => {
    if (list.some(d => d.brand===brand)) map.addLayer(cl);
  });
  document.getElementById('count').textContent = `Showing ${list.length} dealer${list.length!==1?'s':''}`;
  drawRadii(list);
}

// ── STATE FILTER ──────────────────────────────────────────────
function getSource() {
  return Object.entries(allData)
    .filter(([b]) => brandActive[b])
    .flatMap(([,arr]) => arr);
}

function populateStateFilter(src) {
  const sel = document.getElementById('state-filter');
  const cur = sel.value;
  const states = [...new Set(src.map(d => d.state))].sort();
  sel.innerHTML = '<option value="">All States</option>';
  states.forEach(s => { const o=document.createElement('option'); o.value=s; o.textContent=s; sel.appendChild(o); });
  if (states.includes(cur)) sel.value = cur;
}

function applyFilters() {
  const q  = document.getElementById('search').value.toLowerCase().trim();
  const st = document.getElementById('state-filter').value;
  const src = getSource();
  filtered = src.filter(d => {
    const mq = !q || d.name.toLowerCase().includes(q) || d.city.toLowerCase().includes(q) || d.state.toLowerCase().includes(q);
    return mq && (!st || d.state===st);
  });
  renderMarkers(filtered);
  if (document.getElementById('sidebar').style.display==='block') renderSidebar(filtered);
}

// ── BRAND CHECKBOXES ──────────────────────────────────────────
function toggleBrand(brand, on) {
  brandActive[brand] = on;
  document.getElementById(`chk-${brand}`).classList.toggle('on', on);
  populateStateFilter(getSource());
  const curState = document.getElementById('state-filter').value;
  const avail = [...new Set(getSource().map(d=>d.state))];
  if (!avail.includes(curState)) document.getElementById('state-filter').value='';
  applyFilters();
}

// ── STAT PILL SIDEBAR SHORTCUT ────────────────────────────────
['valley','zimmatic','reinke'].forEach(brand => {
  document.getElementById(`s-${brand}`).addEventListener('click', () => {
    // Isolate this brand
    Object.keys(brandActive).forEach(b => {
      brandActive[b] = b===brand;
      document.getElementById(`chk-${b}`).querySelector('input').checked = b===brand;
      document.getElementById(`chk-${b}`).classList.toggle('on', b===brand);
    });
    populateStateFilter(getSource());
    document.getElementById('state-filter').value='';
    applyFilters();
    renderSidebar(filtered);
  });
});

// ── RADIUS CONTROLS ───────────────────────────────────────────
document.querySelectorAll('.r-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.r-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    selectedMiles = parseInt(btn.dataset.miles);
    drawRadii(filtered);
  });
});
document.getElementById('radius-toggle').addEventListener('change', function() {
  showRadii = this.checked;
  drawRadii(filtered);
});

// ── SEARCH / FILTER ───────────────────────────────────────────
document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('state-filter').addEventListener('change', applyFilters);

// ── SIDEBAR ───────────────────────────────────────────────────
const brandLabels = {valley:'Valley', zimmatic:'Zimmatic', reinke:'Reinke'};
function renderSidebar(list) {
  document.getElementById('sidebar-list').innerHTML = list.map((d,i) => `
    <div class="dealer-card ${d.brand}" onclick="flyTo(${i})">
      <div><span class="brand-tag ${d.brand}">${brandLabels[d.brand]}</span></div>
      <h4>${d.name}</h4>
      <p>${d.city}, ${d.state} ${d.zip}</p>
      ${d.phone ? `<p class="phone">&#128222; ${d.phone}</p>` : ''}
    </div>`).join('');
  document.getElementById('sidebar-title').textContent = `${list.length} Dealer${list.length!==1?'s':''}`;
  document.getElementById('sidebar').style.display = 'block';
}
function flyTo(idx) {
  const d = filtered[idx];
  const marker = allMarkers.find(m => m.dealerData === d);
  if (!marker) return;
  clusters[d.brand].zoomToShowLayer(marker, () => marker.openPopup());
}
document.getElementById('close-btn').addEventListener('click', () => {
  document.getElementById('sidebar').style.display = 'none';
});

// ── INIT ──────────────────────────────────────────────────────
document.getElementById('aerial-toggle-btn').addEventListener('click', function() {
  isAerial = !isAerial;
  if (isAerial) {
    map.removeLayer(darkLayer);
    aerialLayer.addTo(map);
    this.classList.add('aerial');
    this.textContent = 'Dark Map';
  } else {
    map.removeLayer(aerialLayer);
    darkLayer.addTo(map);
    this.classList.remove('aerial');
    this.textContent = String.fromCharCode(9728) + ' Aerial';
  }
});

const fipsToState = {

  '54':'West Virginia','55':'Wisconsin','56':'Wyoming'
};
function getChoroColor(k) {
  return k > 5000 ? '#0d4a1a' :
         k > 2000 ? '#1a6e35' :
         k > 1000 ? '#2ea84f' :
         k > 500  ? '#6abf7a' :
         k > 100  ? '#a8d8b0' : '#d4ead8';
}
function choroTooltip(name, k) {
  const label = k >= 1000 ? (k/1000).toFixed(1)+'M' : k+'k';
  return '<b>'+name+'</b><br>'+label+' irrigated acres<br><small style="color:#a0c0e0">USDA 2022 Census of Agriculture</small>';
}

// State layer (zoom < 5)
const choroLayer = L.geoJSON(null, {
  style: f => { const k=irrigData[f.properties.name]||0; return {fillColor:getChoroColor(k),fillOpacity:0.5,color:'#0d1b2a',weight:0.5}; },
  onEachFeature: (f,l) => { const k=irrigData[f.properties.name]||0; l.bindTooltip(choroTooltip(f.properties.name,k),{sticky:true}); }
});

// County layer (zoom >= 5) — USDA NASS 2022 Census + us-atlas geometry
let countyLayer = null;
let countiesLoaded = false;
let countiesLoading = false;
let nearestDealerDist = {};   // fips -> miles to nearest dealer
let cachedCountyGeoJSON = null;
let underservedOverlay = null;
let showUnderserved = false;
let underservedRadius = 50;

function getCountyColor(acres) {
  return acres > 500000 ? '#0d4a1a' :
         acres > 250000 ? '#1a6e35' :
         acres > 100000 ? '#2ea84f' :
         acres >  25000 ? '#6abf7a' :
         acres >   5000 ? '#a8d8b0' :
         acres >      0 ? '#d4ead8' : '#1e2e3e';
}

function rebuildUnderservedLayer() {
  if (underservedOverlay) { map.removeLayer(underservedOverlay); underservedOverlay = null; }
  if (!cachedCountyGeoJSON) return;
  const filtered = cachedCountyGeoJSON.features.filter(f => {
    const fips = String(f.id).padStart(5,'0');
    const cd = nassCountyData[fips];
    if (!cd || cd.a < 5000) return false;
    return (nearestDealerDist[fips] || 0) > underservedRadius;
  });
  underservedOverlay = L.geoJSON({type:'FeatureCollection', features: filtered}, {
    style: () => ({fillColor:'#ff5500', fillOpacity:0.48, color:'#cc2200', weight:1.5}),
    onEachFeature: (f, l) => {
      const fips = String(f.id).padStart(5,'0');
      const cd = nassCountyData[fips];
      const dist = nearestDealerDist[fips] || '?';
      const sprkr = cd.s ? '<br>Sprinkler: ' + cd.s.toLocaleString() + ' acres (USGS 2015)' : '';
      const grow = cd.g !== undefined ? ('<br><span style="color:' + (cd.g >= 0 ? '#6abf7a' : '#f4a85a') + '">' + (cd.g >= 0 ? '&#9650;' : '&#9660;') + ' ' + Math.abs(cd.g) + '% growth 2017&#8594;2022</span>') : '';
      l.bindTooltip(
        '<b>' + cd.n + '</b>' +
        '<br><span style="color:#ff9955">&#9888; Nearest dealer: ' + dist + ' mi</span>' +
        '<br>Irrigated: ' + cd.a.toLocaleString() + ' acres' + sprkr + grow,
        {sticky:true}
      );
    }
  });
  if (showUnderserved) underservedOverlay.addTo(map);
}

async function loadCounties() {
  if (countiesLoaded || countiesLoading) return;
  countiesLoading = true;
  try {
    const topoRes = await fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json');
    const topo = await topoRes.json();
    const geojson = topojson.feature(topo, topo.objects.counties);
    cachedCountyGeoJSON = geojson;

    const allDealers = [...allData.valley, ...allData.zimmatic, ...allData.reinke];

    countyLayer = L.geoJSON(geojson, {
      style: f => {
        const fips = String(f.id).padStart(5,'0');
        const acres = nassCountyData[fips] ? nassCountyData[fips].a : 0;
        return {fillColor:getCountyColor(acres), fillOpacity:0.6, color:'#0d1b2a', weight:0.3};
      },
      onEachFeature: (f, l) => {
        const fips = String(f.id).padStart(5,'0');
        const cd = nassCountyData[fips];
        const name = cd ? cd.n : (fipsToState[fips.substring(0,2)] || 'Unknown') + ' County';
        const acres = cd ? cd.a : 0;

        // Compute nearest dealer distance
        const center = l.getBounds().getCenter();
        let minDist = Infinity;
        for (const d of allDealers) {
          const dist = L.latLng(center).distanceTo(L.latLng(d.lat, d.lng)) / 1609.34;
          if (dist < minDist) minDist = dist;
        }
        nearestDealerDist[fips] = Math.round(minDist);

        // Build tooltip
        let tip = '<b>' + name + '</b>';
        if (acres > 0) {
          tip += '<br>Irrigated: ' + acres.toLocaleString() + ' acres';
          if (cd.s) tip += '<br>Sprinkler: ' + cd.s.toLocaleString() + ' acres <small>(USGS 2015)</small>';
          if (cd.g !== undefined) {
            const col = cd.g >= 0 ? '#6abf7a' : '#f4a85a';
            tip += '<br><span style="color:' + col + '">' + (cd.g >= 0 ? '&#9650;' : '&#9660;') + ' ' + Math.abs(cd.g) + '% growth 2017&#8594;2022</span>';
          }
        } else {
          tip += '<br>No irrigated data';
        }
        tip += '<br><small style="color:#a0c0e0">USDA NASS 2022 Census</small>';
        l.bindTooltip(tip, {sticky:true});
      }
    });

    countiesLoaded = true;
    countiesLoading = false;
    if (showChoro && map.getZoom() >= 5) showCountyLayer();
    if (showUnderserved) rebuildUnderservedLayer();
  } catch(e) {
    countiesLoading = false;
    console.error('County load error:', e);
  }
}

function updateChoroLegend(isCounty) {
  const el = document.getElementById('leg-choro');
  if (isCounty) {
    el.innerHTML = '<div class="choro-title">Irrigated Acres by County (USDA 2022)</div>' +
      '<div class="choro-swatch"><span class="choro-box" style="background:#0d4a1a"></span> 500k+ acres</div>' +
      '<div class="choro-swatch"><span class="choro-box" style="background:#1a6e35"></span> 250–500k</div>' +
      '<div class="choro-swatch"><span class="choro-box" style="background:#2ea84f"></span> 100–250k</div>' +
      '<div class="choro-swatch"><span class="choro-box" style="background:#6abf7a"></span> 25–100k</div>' +
      '<div class="choro-swatch"><span class="choro-box" style="background:#a8d8b0"></span> 5–25k</div>' +
      '<div class="choro-swatch"><span class="choro-box" style="background:#d4ead8"></span> &lt;5k acres</div>' +
      '<div class="choro-swatch"><span class="choro-box" style="background:#1e2e3e"></span> No data</div>';
  } else {
    el.innerHTML = '<div class="choro-title">Irrigated Acres (USDA 2022)</div>' +
      '<div class="choro-swatch"><span class="choro-box" style="background:#0d4a1a"></span> 5M+ acres</div>' +
      '<div class="choro-swatch"><span class="choro-box" style="background:#1a6e35"></span> 2–5M acres</div>' +
      '<div class="choro-swatch"><span class="choro-box" style="background:#2ea84f"></span> 1–2M acres</div>' +
      '<div class="choro-swatch"><span class="choro-box" style="background:#6abf7a"></span> 500k–1M</div>' +
      '<div class="choro-swatch"><span class="choro-box" style="background:#a8d8b0"></span> 100–500k</div>' +
      '<div class="choro-swatch"><span class="choro-box" style="background:#d4ead8"></span> &lt;100k acres</div>';
  }
}

function showStateLayer() {
  if (!map.hasLayer(choroLayer)) choroLayer.addTo(map).bringToBack();
  if (countiesLoaded && countyLayer && map.hasLayer(countyLayer)) map.removeLayer(countyLayer);
  updateChoroLegend(false);
}
function showCountyLayer() {
  if (map.hasLayer(choroLayer)) map.removeLayer(choroLayer);
  if (!map.hasLayer(countyLayer)) countyLayer.addTo(map).bringToBack();
  updateChoroLegend(true);
}
function syncChoroLayers() {
  if (!showChoro) return;
  if (map.getZoom() >= 5) {
    if (countiesLoaded && countyLayer) { showCountyLayer(); }
    else { showStateLayer(); if (!countiesLoaded) loadCounties(); }
  } else {
    showStateLayer();
  }
}
map.on('zoomend', syncChoroLayers);

let choroLoaded = false;
let showChoro = false;
document.getElementById('choro-btn').addEventListener('click', async function() {
  if (!choroLoaded) {
    this.textContent = String.fromCharCode(8987)+' Loading...';
    this.disabled = true;
    try {
      const res = await fetch('https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json');
      const gj = await res.json();
      choroLayer.addData(gj);
      choroLoaded = true;
      showChoro = true;
      this.disabled = false;
      this.classList.add('choro-on');
      this.textContent = String.fromCharCode(127807)+' Irrigated ON';
      document.getElementById('leg-choro').style.display = 'flex';
      showStateLayer();
      if (map.getZoom() >= 5) loadCounties();
    } catch(e) {
      this.disabled = false;
      this.textContent = String.fromCharCode(127807)+' Irrigated (error)';
    }
    return;
  }
  showChoro = !showChoro;
  if (showChoro) {
    this.classList.add('choro-on');
    this.textContent = String.fromCharCode(127807)+' Irrigated ON';
    document.getElementById('leg-choro').style.display = 'flex';
    syncChoroLayers();
  } else {
    if (map.hasLayer(choroLayer)) map.removeLayer(choroLayer);
    if (countiesLoaded && countyLayer && map.hasLayer(countyLayer)) map.removeLayer(countyLayer);
    this.classList.remove('choro-on');
    this.textContent = String.fromCharCode(127807)+' Irrigated';
    document.getElementById('leg-choro').style.display = 'none';
  }
});
// ── UNDERSERVED LAYER ────────────────────────────────────────
document.getElementById('underserved-btn').addEventListener('click', async function() {
  showUnderserved = !showUnderserved;
  if (showUnderserved) {
    this.classList.add('on');
    this.textContent = '⚠ Underserved ON';
    document.getElementById('underserved-radius-panel').style.display = 'flex';
    document.getElementById('leg-underserved').style.display = 'flex';
    if (!countiesLoaded) {
      this.textContent = '⧖ Loading...';
      this.disabled = true;
      await loadCounties();
      this.disabled = false;
      this.textContent = '⚠ Underserved ON';
    }
    rebuildUnderservedLayer();
  } else {
    this.classList.remove('on');
    this.textContent = '⚠ Underserved';
    document.getElementById('underserved-radius-panel').style.display = 'none';
    document.getElementById('leg-underserved').style.display = 'none';
    if (underservedOverlay) { map.removeLayer(underservedOverlay); underservedOverlay = null; }
  }
});

document.querySelectorAll('.u-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.u-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    underservedRadius = parseInt(this.dataset.mi);
    document.querySelector('#leg-underserved .choro-swatch').lastChild.textContent =
      ' >' + underservedRadius + ' mi from nearest dealer, 5k+ acres';
    if (showUnderserved && countiesLoaded) rebuildUnderservedLayer();
  });
});

populateStateFilter(getSource());
applyFilters();
</script>
</body>
</html>
